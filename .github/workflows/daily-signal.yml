name: Daily Signal v88

on:
  workflow_dispatch:
  schedule:
    # JST 07:17 = UTC 22:17 (previous day)
    - cron: "17 22 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance ta requests

      - name: Prepare empty positions file if missing
        run: |
          if [ ! -f positions.csv ]; then
            echo "ticker,entry_date" > positions.csv
          fi

      - name: Run daily signal script
        run: python v88_daily_auto_position.py

      - name: Ensure CSV files exist
        run: |
          [ -f today_entry.csv ] || echo "ticker,date,rsi,score" > today_entry.csv
          [ -f today_exit.csv ] || echo "ticker,reason" > today_exit.csv
          [ -f positions.csv ] || echo "ticker,entry_date" > positions.csv

      - name: Send result to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import os
          import pandas as pd
          import requests

          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook:
              print("DISCORD_WEBHOOK_URL is not set")
              raise SystemExit(0)

          def read_csv_safe(path, columns):
              try:
                  return pd.read_csv(path)
              except Exception:
                  return pd.DataFrame(columns=columns)

          entry = read_csv_safe(
              "today_entry.csv",
              ["ticker", "date", "rsi", "score"]
          )
          exit_df = read_csv_safe(
              "today_exit.csv",
              ["ticker", "reason"]
          )
          pos = read_csv_safe(
              "positions.csv",
              ["ticker", "entry_date"]
          )

          lines = ["**Daily Signal Result**", ""]

          lines.append("**TODAY ENTRY**")
          if entry.empty:
              lines.append("- no entry")
          else:
              for _, row in entry.iterrows():
                  lines.append(
                      f"- {row['ticker']} | date={row['date']} | rsi={float(row['rsi']):.2f}"
                  )

          lines.append("")
          lines.append("**TODAY EXIT**")
          if exit_df.empty:
              lines.append("- no exit")
          else:
              for _, row in exit_df.iterrows():
                  lines.append(f"- {row['ticker']} | reason={row['reason']}")

          lines.append("")
          lines.append("**POSITIONS**")
          if pos.empty:
              lines.append("- empty")
          else:
              for _, row in pos.iterrows():
                  lines.append(f"- {row['ticker']} | entry_date={row['entry_date']}")

          resp = requests.post(
              webhook,
              json={"content": "\n".join(lines)},
              headers={"User-Agent": "Mozilla/5.0 GitHubActions DailySignal/1.0"},
              timeout=30,
          )

          print("Discord webhook status:", resp.status_code)
          print(resp.text)
          resp.raise_for_status()
          PY

      - name: Upload CSV outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-signal-csv
          path: |
            today_entry.csv
            today_exit.csv
            positions.csv
          if-no-files-found: warn