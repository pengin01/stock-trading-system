name: Daily Signal v97

on:
  workflow_dispatch:
  schedule:
    # JST 07:17 = UTC 22:17 (previous day)
    - cron: "17 22 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Show trigger
        run: echo "event=${{ github.event_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance ta requests matplotlib

      - name: Prepare files
        run: |
          [ -f positions.csv ] || echo "ticker,entry_date,entry_price,qty,exit_date" > positions.csv
          [ -f equity.csv ] || echo "date,equity,cash,position_value" > equity.csv
          [ -f cashflow.csv ] || echo "date,amount,note" > cashflow.csv
          [ -f today_entry.csv ] || echo "ticker,signal_date,entry_price,qty,rsi,score" > today_entry.csv
          [ -f today_exit.csv ] || echo "ticker,reason" > today_exit.csv
          [ -f candidate_rank.csv ] || echo "date,rank,ticker,close,prev_close,ma,rsi,value20,pullback_ratio,score" > candidate_rank.csv
          [ -f nikkei225.csv ] || echo "ticker" > nikkei225.csv

      - name: Run v97 system
        run: python v97_system.py

      - name: Send result to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import os
          import pandas as pd
          import requests

          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook:
              print("Webhook not set")
              raise SystemExit(0)

          def read_csv_safe(path):
              try:
                  return pd.read_csv(path)
              except Exception:
                  return pd.DataFrame()

          entry = read_csv_safe("today_entry.csv")
          exit_df = read_csv_safe("today_exit.csv")
          pos = read_csv_safe("positions.csv")
          eq = read_csv_safe("equity.csv")
          cf = read_csv_safe("cashflow.csv")
          cand = read_csv_safe("candidate_rank.csv")

          def prepare_equity(eq_df):
              if eq_df.empty or "date" not in eq_df.columns or "equity" not in eq_df.columns:
                  return pd.DataFrame()
              x = eq_df.copy()
              x["date"] = pd.to_datetime(x["date"], errors="coerce")
              x["equity"] = pd.to_numeric(x["equity"], errors="coerce")
              x = x.dropna(subset=["date", "equity"]).sort_values("date").reset_index(drop=True)
              return x

          def prepare_cashflow(cf_df):
              if cf_df.empty or "date" not in cf_df.columns or "amount" not in cf_df.columns:
                  return pd.DataFrame()
              x = cf_df.copy()
              x["date"] = pd.to_datetime(x["date"], errors="coerce")
              x["amount"] = pd.to_numeric(x["amount"], errors="coerce")
              if "note" not in x.columns:
                  x["note"] = ""
              x = x.dropna(subset=["date", "amount"]).sort_values("date").reset_index(drop=True)
              return x

          def prepare_candidates(cand_df):
              if cand_df.empty:
                  return pd.DataFrame()
              x = cand_df.copy()
              if "date" in x.columns:
                  x["date"] = pd.to_datetime(x["date"], errors="coerce")
              return x

          eq2 = prepare_equity(eq)
          cf2 = prepare_cashflow(cf)
          cand2 = prepare_candidates(cand)

          # signal_date 推定
          signal_date = None
          if not entry.empty and "signal_date" in entry.columns:
              s = pd.to_datetime(entry["signal_date"], errors="coerce").dropna()
              if not s.empty:
                  signal_date = s.iloc[0]

          if signal_date is None and not cand2.empty and "date" in cand2.columns:
              s = cand2["date"].dropna()
              if not s.empty:
                  signal_date = s.iloc[0]

          run_date = pd.Timestamp.now()

          lines = []
          lines.append("📊 **Daily Signal v97**")

          # =========================
          # RUN INFO
          # =========================
          lines.append("")
          lines.append("🗓 RUN INFO")
          lines.append(f"- run_date: {run_date.strftime('%Y-%m-%d')}")
          if signal_date is not None:
              lines.append(f"- signal_date: {signal_date.strftime('%Y-%m-%d')}")
          else:
              lines.append("- signal_date: unknown")

          # =========================
          # ENTRY
          # =========================
          lines.append("")
          lines.append("🟢 ENTRY")
          if entry.empty:
              lines.append("- none")
          else:
              for _, r in entry.iterrows():
                  lines.append(
                      f"- {r['ticker']} | signal={r.get('signal_date','')} | price={r.get('entry_price','')} | qty={int(r.get('qty',0))}"
                  )

          # =========================
          # EXIT
          # =========================
          lines.append("")
          lines.append("🔴 EXIT")
          if exit_df.empty:
              lines.append("- none")
          else:
              for _, r in exit_df.iterrows():
                  lines.append(f"- {r['ticker']} | {r.get('reason','')}")

          # =========================
          # POSITIONS
          # =========================
          lines.append("")
          lines.append("📦 POSITIONS")
          if pos.empty:
              lines.append("- empty")
          else:
              for _, r in pos.iterrows():
                  lines.append(
                      f"- {r.get('ticker','')} | qty={int(r.get('qty',0))} | exit={r.get('exit_date','')}"
                  )

          # =========================
          # CANDIDATES
          # =========================
          lines.append("")
          lines.append("📋 CANDIDATES")
          if cand2.empty:
              lines.append("- none")
          else:
              top3 = cand2.sort_values("rank").head(3)
              for _, r in top3.iterrows():
                  lines.append(
                      f"- #{int(r.get('rank',0))} {r.get('ticker','')} | RSI={r.get('rsi','')} | pullback={r.get('pullback_ratio','')}"
                  )

          # =========================
          # EQUITY
          # =========================
          lines.append("")
          lines.append("💰 EQUITY")

          if eq2.empty:
              lines.append("- unknown")
          else:
              latest = float(eq2["equity"].iloc[-1])
              lines.append(f"- {int(latest)}")

              # TOTAL
              initial = float(eq2["equity"].iloc[0])
              diff = latest - initial
              pct = diff / initial * 100 if initial != 0 else 0

              lines.append("")
              lines.append("📈 TOTAL")
              lines.append(f"- {diff:+.0f} ({pct:+.2f}%)")

          # =========================
          # NOTE
          # =========================
          lines.append("")
          lines.append("ℹ️ NOTE")
          lines.append("- signal_date = latest market data")
          lines.append("- morning run uses previous trading day")

          msg = "\n".join(lines)

          if len(msg) > 1900:
              msg = msg[:1900] + "\n...truncated"

          res = requests.post(webhook, json={"content": msg}, timeout=30)
          print("Discord:", res.status_code)
          res.raise_for_status()
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v97-result
          path: |
            today_entry.csv
            today_exit.csv
            positions.csv
            equity.csv
            cashflow.csv
            candidate_rank.csv
            nikkei225.csv
          if-no-files-found: warn