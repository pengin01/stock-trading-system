name: Daily Signal v92

on:
  workflow_dispatch:
  schedule:
    # JST 07:17 = UTC 22:17
    - cron: "17 22 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Show trigger
        run: echo "event=${{ github.event_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance ta requests

      - name: Prepare files
        run: |
          [ -f positions.csv ] || echo "ticker,entry_date,entry_price,qty" > positions.csv
          [ -f equity.csv ] || echo "timestamp,equity" > equity.csv
          [ -f trades.csv ] || echo "ticker,entry_date,exit_date,entry_price,exit_price,qty,pnl,ret,reason" > trades.csv

      - name: Run v92 system
        run: python v92_unified_system.py

      - name: Ensure CSV outputs exist
        run: |
          [ -f today_entry.csv ] || echo "ticker,signal_date,entry_price,qty,rsi,score" > today_entry.csv
          [ -f today_exit.csv ] || echo "ticker,reason" > today_exit.csv

      - name: Send result to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import os, pandas as pd, requests

          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook:
              print("Webhook not set")
              raise SystemExit(0)

          def read(path):
              try:
                  return pd.read_csv(path)
              except:
                  return pd.DataFrame()

          entry = read("today_entry.csv")
          exit_df = read("today_exit.csv")
          pos = read("positions.csv")
          eq = read("equity.csv")

          lines = []
          lines.append("📊 **Daily Signal v92**")

          # ENTRY
          lines.append("\n🟢 ENTRY")
          if entry.empty:
              lines.append("- none")
          else:
              for _, r in entry.iterrows():
                  lines.append(
                      f"- {r['ticker']} | price={r['entry_price']:.1f} | qty={int(r['qty'])}"
                  )

          # EXIT
          lines.append("\n🔴 EXIT")
          if exit_df.empty:
              lines.append("- none")
          else:
              for _, r in exit_df.iterrows():
                  lines.append(f"- {r['ticker']} | {r['reason']}")

          # POSITIONS
          lines.append("\n📦 POSITIONS")
          if pos.empty:
              lines.append("- empty")
          else:
              for _, r in pos.iterrows():
                  lines.append(f"- {r['ticker']} | qty={int(r['qty'])}")

          # EQUITY
          if not eq.empty:
              latest = eq.iloc[-1]["equity"]
              lines.append(f"\n💰 EQUITY: {int(latest)}")

          msg = "\n".join(lines)

          res = requests.post(webhook, json={"content": msg}, timeout=30)
          print("Discord:", res.status_code)
          res.raise_for_status()
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v92-result
          path: |
            today_entry.csv
            today_exit.csv
            positions.csv
            equity.csv
            trades.csv
          if-no-files-found: warn