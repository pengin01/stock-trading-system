name: Daily Signal v99

on:
  schedule:
    - cron: "5 22 * * 1-5"   # JST 07:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance ta requests

      - name: Prepare positions file if missing
        run: |
          if [ ! -s positions.csv ]; then
            echo "ticker,entry_date,price,qty" > positions.csv
          fi

      - name: Run daily signal
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python v99_daily_signal.py

      - name: Commit updated positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add positions.csv
          git diff --cached --quiet || git commit -m "Update positions.csv"
          git push