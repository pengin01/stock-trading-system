name: Daily Signal

on:
  workflow_dispatch:
  schedule:
    # JST 07:05 = UTC 22:05 (previous day)
    - cron: "5 22 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance ta requests

      - name: Prepare empty positions file if missing
        run: |
          if [ ! -f positions.csv ]; then
            echo "ticker,entry_date" > positions.csv
          fi

      - name: Run daily signal script
        run: python v87_daily.py

      - name: Send result to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import os
          import pandas as pd
          import requests

          webhook = os.environ["DISCORD_WEBHOOK_URL"]

          def read_csv_safe(path, columns):
              try:
                  df = pd.read_csv(path)
                  return df
              except Exception:
                  return pd.DataFrame(columns=columns)

          def pick_value(row, candidates, default=""):
              for c in candidates:
                  if c in row and pd.notna(row[c]):
                      return row[c]
              return default

          entry = read_csv_safe(
              "today_entry.csv",
              ["ticker", "date", "signal_date", "rsi", "score"]
          )
          exit_df = read_csv_safe(
              "today_exit.csv",
              ["ticker", "reason"]
          )

          lines = []
          lines.append("**Daily Signal Result**")

          if entry.empty:
              lines.extend(["", "**TODAY ENTRY**", "- no entry"])
          else:
              lines.extend(["", "**TODAY ENTRY**"])
              for _, row in entry.iterrows():
                  ticker = pick_value(row, ["ticker"], "")
                  date_val = pick_value(row, ["date", "signal_date", "run_date"], "")
                  rsi_val = pick_value(row, ["rsi"], "")
                  score_val = pick_value(row, ["score"], "")

                  try:
                      rsi_text = f"{float(rsi_val):.2f}"
                  except Exception:
                      rsi_text = str(rsi_val)

                  try:
                      score_text = f"{float(score_val):.2f}"
                  except Exception:
                      score_text = str(score_val)

                  lines.append(
                      f"- {ticker} | date={date_val} | rsi={rsi_text} | score={score_text}"
                  )

          if exit_df.empty:
              lines.extend(["", "**TODAY EXIT**", "- no exit"])
          else:
              lines.extend(["", "**TODAY EXIT**"])
              for _, row in exit_df.iterrows():
                  ticker = pick_value(row, ["ticker"], "")
                  reason = pick_value(row, ["reason"], "")
                  lines.append(f"- {ticker} | reason={reason}")

          content = "\n".join(lines)

          resp = requests.post(
              webhook,
              json={"content": content},
              headers={"User-Agent": "Mozilla/5.0 GitHubActions DailySignal/1.0"},
              timeout=30,
          )

          print("Discord webhook status:", resp.status_code)
          print(resp.text)
          resp.raise_for_status()
          PY

      - name: Upload CSV outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-signal-csv
          path: |
            today_entry.csv
            today_exit.csv
            positions.csv
          if-no-files-found: warn