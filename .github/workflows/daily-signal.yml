name: Daily Signal v97

on:
  workflow_dispatch:
  schedule:
    # JST 07:17 = UTC 22:17 (previous day)
    - cron: "17 22 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Show trigger
        run: echo "event=${{ github.event_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance ta requests

      - name: Prepare files
        run: |
          [ -f positions.csv ] || echo "ticker,entry_date,entry_price,qty,exit_date" > positions.csv
          [ -f equity.csv ] || echo "date,equity,cash,position_value" > equity.csv
          [ -f cashflow.csv ] || echo "date,amount,note" > cashflow.csv
          [ -f today_entry.csv ] || echo "ticker,signal_date,entry_price,qty,rsi,score" > today_entry.csv
          [ -f today_exit.csv ] || echo "ticker,reason" > today_exit.csv

      - name: Run v97 system
        run: python v97_system.py

      - name: Send result to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import os
          import pandas as pd
          import requests

          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook:
              print("Webhook not set")
              raise SystemExit(0)

          def read_csv_safe(path):
              try:
                  return pd.read_csv(path)
              except Exception:
                  return pd.DataFrame()

          entry = read_csv_safe("today_entry.csv")
          exit_df = read_csv_safe("today_exit.csv")
          pos = read_csv_safe("positions.csv")
          eq = read_csv_safe("equity.csv")
          cf = read_csv_safe("cashflow.csv")

          def prepare_equity(eq_df):
              if eq_df.empty or "date" not in eq_df.columns or "equity" not in eq_df.columns:
                  return pd.DataFrame()
              x = eq_df.copy()
              x["date"] = pd.to_datetime(x["date"], errors="coerce")
              x["equity"] = pd.to_numeric(x["equity"], errors="coerce")
              x = x.dropna(subset=["date", "equity"]).sort_values("date").reset_index(drop=True)
              return x

          def prepare_cashflow(cf_df):
              if cf_df.empty or "date" not in cf_df.columns or "amount" not in cf_df.columns:
                  return pd.DataFrame()
              x = cf_df.copy()
              x["date"] = pd.to_datetime(x["date"], errors="coerce")
              x["amount"] = pd.to_numeric(x["amount"], errors="coerce")
              if "note" not in x.columns:
                  x["note"] = ""
              x = x.dropna(subset=["date", "amount"]).sort_values("date").reset_index(drop=True)
              return x

          def calc_change_from_date(eq_df, target_date):
              if eq_df.empty:
                  return None
              latest_equity = float(eq_df["equity"].iloc[-1])
              past = eq_df[eq_df["date"] <= target_date]
              if past.empty:
                  base_equity = float(eq_df["equity"].iloc[0])
              else:
                  base_equity = float(past["equity"].iloc[-1])
              diff = latest_equity - base_equity
              pct = diff / base_equity * 100 if base_equity != 0 else 0.0
              return diff, pct

          def calc_week_change(eq_df):
              if eq_df.empty:
                  return None
              latest_date = eq_df["date"].iloc[-1]
              target_date = latest_date - pd.Timedelta(days=7)
              return calc_change_from_date(eq_df, target_date)

          def calc_month_change(eq_df):
              if eq_df.empty:
                  return None
              latest_date = eq_df["date"].iloc[-1]
              month_start = latest_date.replace(day=1)
              return calc_change_from_date(eq_df, month_start)

          def calc_total_change(eq_df):
              if eq_df.empty:
                  return None
              latest_equity = float(eq_df["equity"].iloc[-1])
              initial_equity = float(eq_df["equity"].iloc[0])
              diff = latest_equity - initial_equity
              pct = diff / initial_equity * 100 if initial_equity != 0 else 0.0
              return diff, pct

          def calc_total_cashflow(cf_df, latest_date):
              if cf_df.empty:
                  return 0.0
              x = cf_df[cf_df["date"] <= latest_date]
              if x.empty:
                  return 0.0
              return float(x["amount"].sum())

          lines = []
          lines.append("📊 **Daily Signal v97**")

          lines.append("")
          lines.append("🟢 ENTRY")
          if entry.empty:
              lines.append("- none")
          else:
              for _, r in entry.iterrows():
                  ticker = r.get("ticker", "")
                  price = r.get("entry_price", "")
                  qty = int(r.get("qty", 0))
                  lines.append(f"- {ticker} | price={price} | qty={qty}")

          lines.append("")
          lines.append("🔴 EXIT")
          if exit_df.empty:
              lines.append("- none")
          else:
              for _, r in exit_df.iterrows():
                  ticker = r.get("ticker", "")
                  reason = r.get("reason", "")
                  lines.append(f"- {ticker} | {reason}")

          lines.append("")
          lines.append("📦 POSITIONS")
          if pos.empty:
              lines.append("- empty")
          else:
              for _, r in pos.iterrows():
                  ticker = r.get("ticker", "")
                  qty = int(r.get("qty", 0))
                  exit_date = r.get("exit_date", "")
                  lines.append(f"- {ticker} | qty={qty} | exit={exit_date}")

          lines.append("")
          lines.append("💰 EQUITY")

          eq2 = prepare_equity(eq)
          cf2 = prepare_cashflow(cf)

          if eq2.empty:
              lines.append("- unknown")
          else:
              latest = float(eq2["equity"].iloc[-1])
              latest_date = eq2["date"].iloc[-1]

              if len(eq2) >= 2:
                  prev = float(eq2["equity"].iloc[-2])
                  diff = latest - prev
                  pct = diff / prev * 100 if prev != 0 else 0.0
                  lines.append(f"- {int(latest)} ({diff:+.0f} / {pct:+.2f}%)")
              else:
                  lines.append(f"- {int(latest)}")

              week = calc_week_change(eq2)
              lines.append("")
              lines.append("📅 WEEK")
              if week is None:
                  lines.append("- unknown")
              else:
                  lines.append(f"- {week[0]:+.0f} ({week[1]:+.2f}%)")

              month = calc_month_change(eq2)
              lines.append("")
              lines.append("🗓 MONTH")
              if month is None:
                  lines.append("- unknown")
              else:
                  lines.append(f"- {month[0]:+.0f} ({month[1]:+.2f}%)")

              total = calc_total_change(eq2)
              lines.append("")
              lines.append("📈 TOTAL")
              if total is None:
                  lines.append("- unknown")
              else:
                  lines.append(f"- {total[0]:+.0f} ({total[1]:+.2f}%)")

              total_cashflow = calc_total_cashflow(cf2, latest_date)
              pnl = latest - total_cashflow
              pnl_pct = pnl / total_cashflow * 100 if total_cashflow != 0 else 0.0

              lines.append("")
              lines.append("🏦 CASHFLOW")
              lines.append(f"- {total_cashflow:+.0f}")

              lines.append("")
              lines.append("💹 PNL")
              lines.append(f"- {pnl:+.0f} ({pnl_pct:+.2f}%)")

          msg = "\n".join(lines)

          if len(msg) > 1900:
              msg = msg[:1900] + "\n...truncated"

          res = requests.post(webhook, json={"content": msg}, timeout=30)
          print("Discord:", res.status_code)
          res.raise_for_status()
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v97-result
          path: |
            today_entry.csv
            today_exit.csv
            positions.csv
            equity.csv
            cashflow.csv
          if-no-files-found: warn